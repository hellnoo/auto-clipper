name: weekly AI improver

# Sunday 02:00 UTC — runs the auto_improve.py script which asks Claude
# (via OpenRouter) for 1-3 small improvements, applies them, and opens
# a PR. **Does NOT auto-merge** — you review and merge.
#
# Setup:
#   1. Repository -> Settings -> Secrets and variables -> Actions
#      -> New repository secret: OPENROUTER_API_KEY = sk-or-v1-...
#   2. (Optional) Settings -> Actions -> General -> Workflow permissions
#      -> Read and write permissions  (lets the workflow open PRs)
#
# To trigger manually: Actions tab -> 'weekly AI improver' -> Run workflow.

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  propose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bot deps
        run: pip install --quiet "openai>=1.40.0"

      - name: Run improver
        id: run
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        continue-on-error: true
        run: python scripts/auto_improve.py

      - name: Skip if no changes
        if: steps.run.outcome != 'success'
        run: |
          echo "improver returned no changes — nothing to PR"
          exit 0

      - name: Open PR
        if: steps.run.outcome == 'success'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: AI-proposed weekly improvements"
          branch: "auto-improve/${{ github.run_id }}"
          title: "🤖 Weekly AI improvements"
          body-path: ai_proposal.md
          labels: "ai-bot,auto-merge-candidate"
          delete-branch: true
