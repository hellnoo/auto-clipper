name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: zBorg
          HF_SPACE: auto-clipper
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::Missing HF_TOKEN secret. Add one at: Settings -> Secrets and variables -> Actions"
            exit 1
          fi
          git push --force "https://${HF_USER}:${HF_TOKEN}@huggingface.co/spaces/${HF_USER}/${HF_SPACE}" main
