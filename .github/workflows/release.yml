name: bump version + changelog

# Runs on every push to main that touches code (not docs / config-only).
# Reads conventional-commit prefixes (feat/fix/chore) to decide which
# semver part to bump, updates VERSION + CHANGELOG.md, commits both with
# [skip ci] so it doesn't loop, and tags the release.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'dashboard/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'run.ps1'
      - 'run.bat'

permissions:
  contents: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, 'chore: bump')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # need full history for changelog

      - name: Determine bump
        id: bump
        shell: bash
        run: |
          v=$(cat VERSION 2>/dev/null || echo "0.1.0")
          IFS='.' read -ra parts <<< "$v"
          major=${parts[0]}; minor=${parts[1]}; patch=${parts[2]}

          msg="${{ github.event.head_commit.message }}"
          # Conventional commits → semver bump
          if echo "$msg" | grep -qE '^(feat|fix|refactor)!:|BREAKING CHANGE:'; then
            major=$((major+1)); minor=0; patch=0; bump=major
          elif echo "$msg" | grep -qE '^feat[(:]'; then
            minor=$((minor+1)); patch=0; bump=minor
          else
            patch=$((patch+1)); bump=patch
          fi

          new="$major.$minor.$patch"
          echo "$new" > VERSION
          echo "new=$new"   >> "$GITHUB_OUTPUT"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG
        shell: bash
        run: |
          new="${{ steps.bump.outputs.new }}"
          date=$(date -u +%Y-%m-%d)
          # Pull commits since last tag
          last_tag=$(git tag --sort=-creatordate | head -1)
          if [ -z "$last_tag" ]; then
            commits=$(git log --pretty='- %s' | head -50)
          else
            commits=$(git log "$last_tag"..HEAD --pretty='- %s')
          fi
          # Group by type
          feats=$(echo "$commits"   | grep -E '^- feat'     || true)
          fixes=$(echo "$commits"   | grep -E '^- fix'      || true)
          chores=$(echo "$commits"  | grep -E '^- (chore|refactor|docs|style|test)' || true)

          entry="\n## v${new} — ${date}\n"
          [ -n "$feats" ]  && entry="${entry}\n### Features\n${feats}\n"
          [ -n "$fixes" ]  && entry="${entry}\n### Fixes\n${fixes}\n"
          [ -n "$chores" ] && entry="${entry}\n### Chores\n${chores}\n"

          # Inject between markers
          python3 - <<EOF
          import re, pathlib
          p = pathlib.Path("CHANGELOG.md")
          text = p.read_text(encoding="utf-8")
          marker_start = "<!-- AUTO-CHANGELOG-START -->"
          insert = """${entry}"""
          new_text = text.replace(
              marker_start,
              marker_start + insert,
              1,
          )
          p.write_text(new_text, encoding="utf-8")
          EOF

      - name: Commit + tag
        env:
          NEW: ${{ steps.bump.outputs.new }}
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add VERSION CHANGELOG.md
          git commit -m "chore: bump v$NEW [skip ci]" || { echo "no changes"; exit 0; }
          git tag "v$NEW"
          git push --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new }}
          name: v${{ steps.bump.outputs.new }}
          body: "Auto-generated release. See CHANGELOG.md for details."
          generate_release_notes: true
